name: Create KV Namespace

on:
  workflow_dispatch:

jobs:
  create-kv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Create KV namespace
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          RESULT=$(npx wrangler kv namespace create tsrss-sessions 2>&1)
          echo "$RESULT"
          KV_ID=$(echo "$RESULT" | grep -oP '"id":\s*"\K[^"]+')
          echo ""
          echo "========================================="
          echo "KV_NAMESPACE_ID: $KV_ID"
          echo "========================================="
          echo "Copy this ID and add it as a GitHub secret:"
          echo "Settings → Secrets and variables → Actions → KV_NAMESPACE_ID"
