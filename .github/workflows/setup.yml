name: Setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Create D1 database
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 create tsrss-db

      - name: Auto-detect resource IDs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          D1_OUTPUT=$(npx --silent wrangler d1 list --json 2>&1)
          echo "D1 output: $D1_OUTPUT"
          D1_ID=$(echo "$D1_OUTPUT" | jq -r '.[] | select(.name == "tsrss-db") | .uuid' 2>/dev/null)
          echo "D1 ID: $D1_ID"
          KV_OUTPUT=$(npx --silent wrangler kv:namespace list --json 2>&1)
          echo "KV output: $KV_OUTPUT"
          KV_ID=$(echo "$KV_OUTPUT" | jq -r '.[] | select(.title == "tsrss-sessions") | .id' 2>/dev/null)
          echo "KV ID: $KV_ID"
          if [ -n "$D1_ID" ] && [ "$D1_ID" != "null" ]; then
            sed -i "s/__D1_DATABASE_ID__/$D1_ID/" wrangler.toml
          fi
          if [ -n "$KV_ID" ] && [ "$KV_ID" != "null" ]; then
            sed -i "s/__KV_NAMESPACE_ID__/$KV_ID/" wrangler.toml
          fi

      - name: Apply migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply tsrss-db

      - name: Create KV namespace
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: kv:namespace create tsrss-sessions
