name: Setup

on:
  workflow_dispatch:
    inputs:
      db_name:
        description: 'D1 database name to create (tsrss-db or tsrss-preview-db, leave empty to list only)'
        required: false
        default: ''
      recreate:
        description: 'Delete existing DB before creating (true/false, yes/no)'
        required: false
        default: 'false'

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Set resource names
        id: names
        run: |
          DB_NAME="${{ github.event.inputs.db_name }}"
          echo "db_name=$DB_NAME" >> $GITHUB_OUTPUT
          if [ "$DB_NAME" = "tsrss-preview-db" ]; then
            echo "kv_name=tsrss-preview-sessions" >> $GITHUB_OUTPUT
            echo "d1_placeholder=__PREVIEW_D1_DATABASE_ID__" >> $GITHUB_OUTPUT
            echo "kv_placeholder=__PREVIEW_KV_NAMESPACE_ID__" >> $GITHUB_OUTPUT
            echo "env_flag=-e preview" >> $GITHUB_OUTPUT
          else
            echo "kv_name=tsrss-sessions" >> $GITHUB_OUTPUT
            echo "d1_placeholder=__D1_DATABASE_ID__" >> $GITHUB_OUTPUT
            echo "kv_placeholder=__KV_NAMESPACE_ID__" >> $GITHUB_OUTPUT
            echo "env_flag=" >> $GITHUB_OUTPUT
          fi
          RECREATE_LOWER=$(echo "${{ github.event.inputs.recreate }}" | tr '[:upper:]' '[:lower:]')
          if [ "$RECREATE_LOWER" = "true" ] || [ "$RECREATE_LOWER" = "yes" ]; then
            echo "recreate=true" >> $GITHUB_OUTPUT
          else
            echo "recreate=false" >> $GITHUB_OUTPUT
          fi

      - name: List existing resources
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 list

      - name: Delete D1
        if: steps.names.outputs.db_name != '' && steps.names.outputs.recreate == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DB_NAME: ${{ steps.names.outputs.db_name }}
        run: |
          npx wrangler d1 delete "$DB_NAME" -y || echo "D1 not found or already deleted"

      - name: Delete KV
        if: steps.names.outputs.db_name != '' && steps.names.outputs.recreate == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KV_NAME: ${{ steps.names.outputs.kv_name }}
        run: |
          KV_LIST=$(npx wrangler kv namespace list --json 2>/dev/null || true)
          KV_ID=$(echo "$KV_LIST" | jq -r ".result[]? | select(.title == \"$KV_NAME\") | .id" 2>/dev/null || true)
          if [ -n "$KV_ID" ] && [ "$KV_ID" != "null" ]; then
            echo "Deleting KV: $KV_ID"
            npx wrangler kv namespace delete "$KV_ID" -y || true
          else
            echo "KV not found, skipping"
          fi

      - name: Create D1
        if: steps.names.outputs.db_name != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 create ${{ steps.names.outputs.db_name }}

      - name: Get D1 ID & update wrangler.toml
        if: steps.names.outputs.db_name != ''
        env:
          DB_NAME: ${{ steps.names.outputs.db_name }}
          PLACEHOLDER: ${{ steps.names.outputs.d1_placeholder }}
        run: |
          D1_LIST=$(npx wrangler d1 list --json 2>/dev/null || true)
          D1_ID=$(echo "$D1_LIST" | jq -r ".result[]? | select(.name == \"$DB_NAME\") | .uuid" 2>/dev/null || true)
          [ -z "$D1_ID" ] || [ "$D1_ID" = "null" ] && { echo "Failed to find D1"; exit 1; }
          echo "D1_ID=$D1_ID"
          sed -i "s/$PLACEHOLDER/$D1_ID/" wrangler.toml

      - name: Apply migrations
        if: steps.names.outputs.db_name != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply ${{ steps.names.outputs.db_name }} --remote ${{ steps.names.outputs.env_flag }}

      - name: Create KV
        if: steps.names.outputs.db_name != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: kv namespace create ${{ steps.names.outputs.kv_name }}

      - name: Get KV ID & update wrangler.toml
        if: steps.names.outputs.db_name != ''
        env:
          KV_NAME: ${{ steps.names.outputs.kv_name }}
          KV_PLACEHOLDER: ${{ steps.names.outputs.kv_placeholder }}
        run: |
          KV_LIST=$(npx wrangler kv namespace list --json 2>/dev/null || true)
          KV_ID=$(echo "$KV_LIST" | jq -r ".result[]? | select(.title == \"$KV_NAME\") | .id" 2>/dev/null || true)
          [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ] && { echo "Failed to find KV"; exit 1; }
          echo "KV_ID=$KV_ID"
          sed -i "s/$KV_PLACEHOLDER/$KV_ID/" wrangler.toml
