name: Setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Setup resources
        run: |
          npx wrangler d1 create tsrss-db || true
          npx wrangler d1 migrations apply tsrss-db
          npx wrangler kv:namespace create tsrss-sessions || true
