name: Setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Create D1 database
        id: create-db
        run: |
          if npx wrangler d1 create tsrss-db 2>&1 | tee /tmp/d1-create.log; then
            echo "created=true" >> $GITHUB_OUTPUT
          else
            echo "created=false" >> $GITHUB_OUTPUT
            echo "D1 database already exists"
          fi

      - name: Create KV namespace
        run: |
          npx wrangler kv:namespace create tsrss-sessions || echo "KV namespace already exists"

      - name: Apply database migrations
        if: steps.create-db.outputs.created == 'true'
        run: |
          npx wrangler d1 migrations apply tsrss-db

      - name: Verify resources
        run: |
          echo "=== D1 Databases ==="
          npx wrangler d1 list
          echo ""
          echo "=== KV Namespaces ==="
          npx wrangler kv:namespace list
