name: Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - name: Set version for production (tag)
        if: github.ref_type == 'tag'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          sed -i "s/vDev/${VERSION}/g" wrangler.toml
          echo "Version: ${VERSION}"

      - name: Set version for preview (commit SHA)
        if: github.ref_type != 'tag'
        run: |
          VERSION="${GITHUB_SHA::7}"
          sed -i "s/vDev/${VERSION}/g" wrangler.toml
          echo "Version: ${VERSION}"

      - name: Auto-detect resource IDs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          D1_ID=$(npx --silent wrangler d1 list --json 2>&1 | jq -r '.[] | select(.name == "tsrss-db") | .uuid' 2>/dev/null)
          PREVIEW_D1_ID=$(npx --silent wrangler d1 list --json 2>&1 | jq -r '.[] | select(.name == "tsrss-preview-db") | .uuid' 2>/dev/null)
          KV_ID=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | jq -r '.result[] | select(.title == "tsrss-sessions") | .id' 2>/dev/null)
          PREVIEW_KV_ID=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | jq -r '.result[] | select(.title == "tsrss-preview-sessions") | .id' 2>/dev/null)
          echo "D1_ID: $D1_ID"
          echo "PREVIEW_D1_ID: $PREVIEW_D1_ID"
          echo "KV_ID: $KV_ID"
          echo "PREVIEW_KV_ID: $PREVIEW_KV_ID"
          if [ -n "$D1_ID" ] && [ "$D1_ID" != "null" ]; then
            sed -i "s/__D1_DATABASE_ID__/$D1_ID/" wrangler.toml
          fi
          if [ -n "$PREVIEW_D1_ID" ] && [ "$PREVIEW_D1_ID" != "null" ]; then
            sed -i "s/__PREVIEW_D1_DATABASE_ID__/$PREVIEW_D1_ID/" wrangler.toml
          fi
          if [ -n "$KV_ID" ] && [ "$KV_ID" != "null" ]; then
            sed -i "s/__KV_NAMESPACE_ID__/$KV_ID/" wrangler.toml
          fi
          if [ -n "$PREVIEW_KV_ID" ] && [ "$PREVIEW_KV_ID" != "null" ]; then
            sed -i "s/__PREVIEW_KV_NAMESPACE_ID__/$PREVIEW_KV_ID/" wrangler.toml
          fi

      - name: Deploy to production
        if: github.ref_type == 'tag'
        uses: cloudflare/wrangler-action@v3
        env:
          TSRSS_PASSWORD: ${{ secrets.TSRSS_PASSWORD }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          secrets: |
            TSRSS_PASSWORD

      - name: Set preview secret
        if: github.ref_type != 'tag'
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TSRSS_PASSWORD: ${{ secrets.TSRSS_PASSWORD }}
        run: |
          echo "$TSRSS_PASSWORD" | npx wrangler secret put TSRSS_PASSWORD --env preview

      - name: Deploy preview
        if: github.ref_type != 'tag'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env preview

      - name: Get workers.dev subdomain
        id: subdomain
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          SUBDOMAIN=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | jq -r '.result.subdomain')
          echo "subdomain=$SUBDOMAIN" >> $GITHUB_OUTPUT

      - name: Output production URL
        if: github.ref_type == 'tag'
        run: |
          echo ""
          echo "========================================="
          echo "Production URL: https://tsrss.${{ steps.subdomain.outputs.subdomain }}.workers.dev"
          echo "========================================="

      - name: Output preview URL
        if: github.ref_type != 'tag'
        run: |
          echo ""
          echo "========================================="
          echo "Preview URL: https://tsrss-preview.${{ steps.subdomain.outputs.subdomain }}.workers.dev"
          echo "========================================="
