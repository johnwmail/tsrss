name: Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - name: Set version for production (tag)
        if: github.ref_type == 'tag'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          sed -i "s/vDev/${VERSION}/g" wrangler.toml
          echo "Version: ${VERSION}"

      - name: Set version for preview (commit SHA)
        if: github.ref_type != 'tag'
        run: |
          VERSION="${GITHUB_SHA::7}"
          sed -i "s/vDev/${VERSION}/g" wrangler.toml
          echo "Version: ${VERSION}"

      - name: Auto-detect resource IDs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          D1_ID=$(npx --silent wrangler d1 list --json 2>&1 | jq -r '.[] | select(.name == "tsrss-db") | .uuid' 2>/dev/null)
          KV_ID=$(npx --silent wrangler kv namespace list --json 2>&1 | jq -r '.[] | select(.title == "tsrss-sessions") | .id' 2>/dev/null)
          if [ -n "$D1_ID" ] && [ "$D1_ID" != "null" ]; then
            sed -i "s/__D1_DATABASE_ID__/$D1_ID/" wrangler.toml
          fi
          if [ -n "$KV_ID" ] && [ "$KV_ID" != "null" ]; then
            sed -i "s/__KV_NAMESPACE_ID__/$KV_ID/" wrangler.toml
          fi

      - name: Deploy to production
        if: github.ref_type == 'tag'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Upload preview version
        if: github.ref_type != 'tag'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias preview
